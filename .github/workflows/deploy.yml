name: Deploy n8n to Hostinger VPS

on:
  push:
    branches:
      - main # Mude se a sua branch principal for 'master'

jobs:
  deploy:
    name: 🚀 Deploy n8n
    runs-on: ubuntu-latest
    steps:
      - name: 🔗 Conectar, Atualizar e Reiniciar
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }} # Lembre-se de colocar 'deploy' no Secret do GitHub
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            # 1. Navega até o diretório do n8n na VPS
            cd /opt/n8n/

            # 2. Cria a pasta de dados caso ela não exista
            mkdir -p n8n_data
            
            # 3. AUTOMATIZAÇÃO: Garante que o n8n (1000) manda na pasta de dados
            # O resto da pasta /opt/n8n continua sendo do deploy (1001)
            sudo chown -R 1000:1000 /opt/n8n/n8n_data
            
            # 2. Puxa as atualizações do código do GitHub
            git pull origin main 2>&1
            
            # 3. Baixa as imagens mais recentes (útil se você atualizou a tag da versão do n8n no docker-compose)
            docker-compose pull 2>&1
            
            # 4. Sobe os containers novamente aplicando as alterações em segundo plano (-d)
            docker-compose up -d --build --force-recreate 2>&1
            
            # 5. Limpa imagens antigas do Docker que ficaram sem uso para não lotar o disco da Hostinger (Opcional, mas recomendado)
            docker image prune -f 2>&1
